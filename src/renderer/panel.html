<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 12px;
      user-select: none;
    }
    .banner {
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 13px;
    }
    .price-row {
      margin-bottom: 10px;
    }
    .section-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .bar-track {
      background: #333;
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .val-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .val {
      font-size: 18px;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    .zone {
      font-size: 11px;
      color: #aaa;
    }
    #price {
      font-size: 22px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="banner" id="banner">— NO SIGNAL —</div>

  <div class="price-row">
    <div class="section-label">Bitcoin Price</div>
    <div id="price">---</div>
  </div>

  <div class="section-label">Fear &amp; Greed</div>
  <div class="bar-track">
    <div class="bar-fill" id="fg-bar" style="width: 0%;"></div>
  </div>
  <div class="val-row">
    <div class="val" id="fg-val">---</div>
    <div class="zone" id="fg-zone"></div>
  </div>

  <div class="section-label">Mayer Multiple</div>
  <div class="bar-track">
    <div class="bar-fill" id="mayer-bar" style="width: 0%;"></div>
  </div>
  <div class="val-row">
    <div class="val" id="mayer-val">---</div>
    <div class="zone" id="mayer-zone"></div>
  </div>

  <div class="section-label">MVRV Z-Score</div>
  <div class="bar-track">
    <div class="bar-fill" id="mvrv-bar" style="width: 0%;"></div>
  </div>
  <div class="val-row">
    <div class="val" id="mvrv-value">--</div>
    <div class="zone" id="mvrv-label">--</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const BANNER_COLORS = {
      STRONG_BUY: { bg: '#1a3a5c', text: '#3498db' },
      OVERHEATED: { bg: '#3a1a1a', text: '#e74c3c' },
      FEARFUL:    { bg: '#3a2a1a', text: '#e67e22' },
      GREEDY:     { bg: '#3a3a1a', text: '#f1c40f' },
      NEUTRAL:    { bg: '#2a2a2a', text: '#95a5a6' },
    };
    const DEFAULT_BANNER = { bg: '#222', text: '#555' };

    const SIGNAL_LABELS = {
      STRONG_BUY: '🔵 STRONG BUY',
      OVERHEATED: '🔴 OVERHEATED',
      FEARFUL:    '🟠 FEARFUL',
      GREEDY:     '🟡 GREEDY',
      NEUTRAL:    '⚪ NEUTRAL',
    };

    function fearColor(v) {
      if (v <= 25) return '#e74c3c';
      if (v <= 45) return '#e67e22';
      if (v <= 55) return '#95a5a6';
      if (v <= 75) return '#2ecc71';
      return '#27ae60';
    }

    function mayerColor(v) {
      if (v <= 0.8) return '#3498db';
      if (v <= 1.0) return '#2ecc71';
      if (v <= 1.5) return '#f39c12';
      return '#e74c3c';
    }

    function mayerBarWidth(v) {
      return Math.min(v / 2.5, 1) * 100 + '%';
    }

    ipcRenderer.on('data-update', (_, data) => {
      const banner   = document.getElementById('banner');
      const priceEl  = document.getElementById('price');
      const fgBar    = document.getElementById('fg-bar');
      const fgVal    = document.getElementById('fg-val');
      const fgZone   = document.getElementById('fg-zone');
      const mayerBar = document.getElementById('mayer-bar');
      const mayerVal = document.getElementById('mayer-val');
      const mayerZone = document.getElementById('mayer-zone');

      // Signal banner
      const colors = BANNER_COLORS[data.marketState] || DEFAULT_BANNER;
      banner.style.background = colors.bg;
      banner.style.color = colors.text;
      banner.textContent = SIGNAL_LABELS[data.marketState] || '— NO SIGNAL —';

      // Price
      priceEl.textContent = data.price != null
        ? '$' + data.price.toLocaleString() : '---';

      // Fear & Greed
      if (data.fearGreed != null) {
        const fc = fearColor(data.fearGreed);
        fgBar.style.width = data.fearGreed + '%';
        fgBar.style.background = fc;
        fgVal.textContent = data.fearGreed;
        fgVal.style.color = fc;
      } else {
        fgBar.style.width = '0%';
        fgVal.textContent = '---';
        fgVal.style.color = '';
      }
      fgZone.textContent = data.fearGreedLabel ?? '';

      // Mayer Multiple
      if (data.mayerMultiple != null) {
        const mc = mayerColor(data.mayerMultiple);
        mayerBar.style.width = mayerBarWidth(data.mayerMultiple);
        mayerBar.style.background = mc;
        mayerVal.textContent = data.mayerMultiple.toFixed(2);
        mayerVal.style.color = mc;
      } else {
        mayerBar.style.width = '0%';
        mayerVal.textContent = '---';
        mayerVal.style.color = '';
      }
      mayerZone.textContent = data.mayerLabel ?? '';

      // MVRV Z-Score
      const mvrvBar   = document.getElementById('mvrv-bar');
      const mvrvValue = document.getElementById('mvrv-value');
      const mvrvLabel = document.getElementById('mvrv-label');
      if (data.mvrvZScore != null) {
        const pct = Math.min(Math.max(data.mvrvZScore / 4, 0), 1) * 100;
        mvrvBar.style.width = pct + '%';
        mvrvBar.style.background = data.mvrvColor ?? '#95a5a6';
        mvrvValue.textContent = data.mvrvZScore.toFixed(2);
        mvrvValue.style.color = data.mvrvColor ?? '';
      } else {
        mvrvBar.style.width = '0%';
        mvrvValue.textContent = '—';
        mvrvValue.style.color = '';
      }
      mvrvLabel.textContent = data.mvrvLabel ?? '';
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') window.close();
    });
  </script>
</body>
</html>
