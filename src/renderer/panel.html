<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
      user-select: none;
    }
    .metric { margin-bottom: 10px; }
    .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 20px; font-weight: 600; }
    .sublabel { font-size: 12px; color: #aaa; margin-top: 2px; }
    .divider { border: none; border-top: 1px solid #333; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="metric">
    <div class="label">Bitcoin Price</div>
    <div class="value" id="price">---</div>
  </div>
  <hr class="divider">
  <div class="metric">
    <div class="label">Fear &amp; Greed</div>
    <div class="value" id="fg">---</div>
    <div class="sublabel" id="fg-label"></div>
  </div>
  <hr class="divider">
  <div class="metric">
    <div class="label">Mayer Multiple</div>
    <div class="value" id="mayer">---</div>
    <div class="sublabel" id="mayer-label"></div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    function fearColor(v) {
      if (v <= 25) return '#e74c3c';
      if (v <= 45) return '#e67e22';
      if (v <= 55) return '#95a5a6';
      if (v <= 75) return '#2ecc71';
      return '#27ae60';
    }

    function mayerColor(v) {
      if (v <= 0.8) return '#3498db';
      if (v <= 1.0) return '#2ecc71';
      if (v <= 1.5) return '#f39c12';
      return '#e74c3c';
    }

    ipcRenderer.on('data-update', (_, data) => {
      const priceEl = document.getElementById('price');
      const fgEl = document.getElementById('fg');
      const mayerEl = document.getElementById('mayer');

      priceEl.textContent = data.price != null
        ? `$${data.price.toLocaleString()}` : '---';
      fgEl.textContent = data.fearGreed ?? '---';
      document.getElementById('fg-label').textContent = data.fearGreedLabel ?? '';
      mayerEl.textContent = data.mayerMultiple != null
        ? data.mayerMultiple.toFixed(2) : '---';
      document.getElementById('mayer-label').textContent = data.mayerLabel ?? '';

      if (data.fearGreed != null) fgEl.style.color = fearColor(data.fearGreed);
      if (data.mayerMultiple != null) {
        const mc = mayerColor(data.mayerMultiple);
        mayerEl.style.color = mc;
        priceEl.style.color = mc;
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') window.close();
    });
  </script>
</body>
</html>
